<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PaiNaiDee - Discover Thailand's Hidden Gems</title>
    <meta name="description" content="Explore Thailand's most beautiful destinations with PaiNaiDee. Find beaches, temples, mountains, and cultural sites with detailed guides and reviews." />
    <meta name="author" content="PaiNaiDee Team" />
    <meta name="keywords" content="Thailand travel, tourism, attractions, beaches, temples, mountains, travel guide" />
    <meta name="theme-color" content="#3b82f6" />

    <!-- Accessibility and SEO improvements -->
    <meta name="robots" content="index, follow" />
    <meta name="language" content="en,th" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="PaiNaiDee - Discover Thailand's Hidden Gems" />
    <meta property="og:description" content="Explore Thailand's most beautiful destinations with detailed guides, reviews, and interactive maps." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://painaidee.com" />
    <meta property="og:site_name" content="PaiNaiDee" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="th_TH" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PaiNaiDee - Discover Thailand's Hidden Gems" />
    <meta name="twitter:description" content="Explore Thailand's most beautiful destinations with detailed guides and reviews." />

    <!-- Favicon and app icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.ico" />
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Accessibility: Reduced motion support -->
    <style>
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
      
      /* Skip link styling */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 6px;
        background: #000;
        color: #fff;
        padding: 8px;
        text-decoration: none;
        z-index: 1000;
      }
      
      .skip-link:focus {
        top: 6px;
      }
      
      /* Initial loading indicator */
      #initial-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: system-ui, -apple-system, sans-serif;
      }
      
      #initial-loading .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f4f6;
        border-top: 4px solid #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      #initial-loading .text {
        margin-top: 16px;
        color: #6b7280;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <!-- Initial loading indicator -->
    <div id="initial-loading">
      <div style="text-align: center;">
        <div class="spinner"></div>
        <div class="text">Loading PaiNaiDee...</div>
      </div>
    </div>
    
    <!-- Error detection script (loads first for early error capture) -->
    <script src="/error-detector.js"></script>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Remove loading indicator after timeout -->
    <script>
      setTimeout(() => {
        const loading = document.getElementById('initial-loading');
        if (loading) {
          loading.remove();
        }
      }, 15000); // Remove after 15 seconds regardless
    </script>
  </body>
</html>
